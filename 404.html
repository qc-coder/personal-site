<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Dr. Vladimir Milchakov</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2em 0;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #3498db; /* The brighter blue from your contact bar */
            margin: 0;
            line-height: 1;
        }
        h2 {
            color: #2c3e50;
            margin-top: 10px;
            font-size: 24px;
        }
        p {
            max-width: 500px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn-home:hover {
            background-color: #2980b9;
        }
        footer {
            text-align: center;
            padding: 1.5em 0;
            font-size: 0.9em;
            color: #999;
            background: #fff;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 1.5em;">Dr. Vladimir Milchakov</h1>
    </header>

    <div class="content">
        <div class="error-code">404</div>
        <h2>Observation Failed</h2>
        <p>
            The page you are looking for does not exist or has moved to a 
            different coordinate. 
        </p>
        <a href="index.html" class="btn-home">Return to Homepage</a>
    </div>

    <footer>
        © 2026 Dr. Vladimir Milchakov
    </footer>

</body>
</html>
